version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logmein-net
    secrets:
      - db_name
      - db_user
      - db_password
    deploy:
      placement:
        constraints:
          - node.role == manager

  backend:
    image: ghcr.io/chris-rattana/logmein-backend:latest
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME_FILE: /run/secrets/db_name
      DB_USER_FILE: /run/secrets/db_user
      DB_PASSWORD_FILE: /run/secrets/db_password
      BACKEND_PORT: 5000
    networks:
      - logmein-net
    secrets:
      - db_name
      - db_user
      - db_password
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  frontend:
    image: ghcr.io/chris-rattana/logmein-frontend:latest
    networks:
      - logmein-net
    ports:
      - target: 80
        published: 8080
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

networks:
  logmein-net:
    driver: overlay

volumes:
  postgres_data:

secrets:
  db_name:
    external: true
  db_user:
    external: true
  db_password:
    external: true
