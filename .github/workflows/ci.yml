name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-quality-and-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: logs_db
          POSTGRES_USER: logs_user
          POSTGRES_PASSWORD: logs_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U logs_user -d logs_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: logs_db
      DB_USER: logs_user
      DB_PASSWORD: logs_password
      BACKEND_PORT: 5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements.dev.txt

      - name: Check formatting with Black
        working-directory: backend
        run: black --check app.py tests/test_api.py

      - name: Lint with Flake8
        working-directory: backend
        run: flake8 .

      - name: Security scan with Bandit
        working-directory: backend
        run: bandit -r . -x ./tests

      - name: Run backend tests
        working-directory: backend
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-quality-and-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t logmein-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t logmein-frontend:ci ./frontend